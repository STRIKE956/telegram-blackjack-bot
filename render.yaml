# Render Blueprint: https://render.com/docs/blueprint-spec
services:
  - type: worker
    name: strike-blackjack-bot
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    envVars:
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: SOLANA_RPC_URL
        value: https://api.devnet.solana.com
      - key: DATA_DIR
        value: /app/data
