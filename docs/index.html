<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="strike-api" content="" />
  <title>STRIKE Games</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app">
    <header class="header">
      <div class="logo">♠️ STRIKE</div>
      <div class="chips" id="balance">…</div>
    </header>
    <nav class="tabs">
      <button class="tab active" data-tab="play">Play</button>
      <button class="tab" data-tab="strike">Strike</button>
      <button class="tab" data-tab="squad">Squad</button>
      <button class="tab" data-tab="vibes">Vibes</button>
    </nav>
    <main id="panel-play" class="panel active">
      <div class="table">
        <div class="dealer-area">
          <div class="label">Dealer <span id="dealer-val"></span></div>
          <div class="cards" id="dealer-cards"></div>
        </div>
        <div class="player-area">
          <div class="label">You <span id="player-val"></span></div>
          <div class="cards" id="player-cards"></div>
        </div>
      </div>
      <p class="status" id="game-status">Place a bet and deal!</p>
      <div class="bet-row">
        <input type="number" id="bet" value="100" min="10" step="10" />
        <button id="btn-deal" class="btn primary">Deal</button>
      </div>
      <div class="actions" id="actions" hidden>
        <button id="btn-hit" class="btn">Hit</button>
        <button id="btn-stand" class="btn primary">Stand</button>
      </div>
    </main>
    <main id="panel-strike" class="panel">
      <div class="strike-avatar">⚡</div>
      <p class="strike-title">Strike · hype bestie</p>
      <div class="chat" id="strike-chat"></div>
      <div class="chat-input">
        <input id="strike-msg" placeholder="Talk to Strike…" />
        <button id="btn-strike-send" class="btn primary">Send</button>
      </div>
    </main>
    <main id="panel-squad" class="panel">
      <p class="hint">Compete with friends — most STRIKECOINS wins.</p>
      <div class="room-actions">
        <button id="btn-room-create" class="btn">Create room</button>
        <button id="btn-room-join" class="btn">Join code</button>
      </div>
      <input id="room-code" placeholder="ROOM CODE" class="room-input" />
      <ul class="leaderboard" id="leaderboard"></ul>
      <p class="invite" id="invite-link"></p>
    </main>
    <main id="panel-vibes" class="panel">
      <p class="hint">Table soundtrack — tap to play in Telegram.</p>
      <div id="tracks"></div>
      <h3>Live streams</h3>
      <div id="live-streams"></div>
    </main>
    <footer class="footer">
      <a href="#" id="disclaimer-link">Disclaimer</a> · entertainment only
    </footer>
  </div>
  <script src="app.js"></script>
</body>
</html>
